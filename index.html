<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Story Album</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Формы авторизации */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }

        .auth-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .auth-card h2 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
        }

        .auth-card input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }

        .auth-card button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a67d8;
        }

        .btn-secondary {
            background: #48bb78;
            color: white;
        }

        .btn-secondary:hover {
            background: #38a169;
        }

        .btn-danger {
            background: #e53e3e;
            color: white;
        }

        .switch-link {
            text-align: center;
            margin-top: 20px;
            color: #667eea;
            cursor: pointer;
        }

        /* Основное приложение */
        .app-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
        }

        .storage-info {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .progress-bar {
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
            height: 10px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            background: #48bb78;
            height: 100%;
            transition: width 0.3s;
        }

        .upload-area {
            background: #f7fafc;
            border: 2px dashed #cbd5e0;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .photo-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .photo-card:hover {
            transform: translateY(-5px);
        }

        .photo-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            cursor: pointer;
        }

        .photo-info {
            padding: 10px;
        }

        .photo-caption {
            font-size: 14px;
            color: #4a5568;
            margin-bottom: 10px;
        }

        .delete-btn {
            background: #e53e3e;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }

        .logout-btn {
            background: #e53e3e;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Форма авторизации -->
        <div id="authSection" class="auth-container">
            <div class="auth-card">
                <h2>❤️ Love Story Album</h2>
                <div id="loginForm">
                    <input type="email" id="email" placeholder="Email">
                    <input type="password" id="password" placeholder="Пароль">
                    <button class="btn-primary" onclick="login()">Войти</button>
                    <div class="switch-link" onclick="showRegister()">Нет аккаунта? Зарегистрироваться</div>
                    <div class="switch-link" onclick="showForgot()">Забыли пароль?</div>
                </div>
                <div id="registerForm" class="hidden">
                    <input type="email" id="regEmail" placeholder="Email">
                    <input type="password" id="regPassword" placeholder="Пароль">
                    <button class="btn-primary" onclick="register()">Зарегистрироваться</button>
                    <div class="switch-link" onclick="showLogin()">Уже есть аккаунт? Войти</div>
                </div>
                <div id="forgotForm" class="hidden">
                    <input type="email" id="forgotEmail" placeholder="Email">
                    <button class="btn-primary" onclick="forgotPassword()">Отправить код</button>
                    <div class="switch-link" onclick="showLogin()">Назад к входу</div>
                </div>
            </div>
        </div>

        <!-- Основное приложение -->
        <div id="appSection" class="hidden">
            <div class="app-container">
                <div class="header">
                    <h2>❤️ Моя история любви</h2>
                    <button class="logout-btn" onclick="logout()">Выйти</button>
                </div>

                <div class="storage-info" id="storageInfo">
                    Загрузка...
                </div>

                <div class="upload-area">
                    <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="uploadPhoto()">
                    <input type="text" id="caption" placeholder="Подпись к фото..." style="width: 70%; padding: 10px; margin-right: 10px; border-radius: 10px; border: 1px solid #ddd;">
                    <button class="btn-primary" onclick="document.getElementById('fileInput').click()">📸 Выбрать фото</button>
                </div>

                <div id="gallery" class="gallery">
                    <!-- Фото будут здесь -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000';

        // Проверяем токен при загрузке
        const token = localStorage.getItem('token');
        if (token) {
            checkAuth();
        }

        async function checkAuth() {
            try {
                const res = await fetch(`${API_URL}/api/photos`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                if (res.ok) {
                    showApp();
                    loadPhotos();
                } else {
                    localStorage.removeItem('token');
                    showAuth();
                }
            } catch {
                showAuth();
            }
        }

        function showAuth() {
            document.getElementById('authSection').classList.remove('hidden');
            document.getElementById('appSection').classList.add('hidden');
        }

        function showApp() {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('appSection').classList.remove('hidden');
        }

        function showLogin() {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('forgotForm').classList.add('hidden');
        }

        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
            document.getElementById('forgotForm').classList.add('hidden');
        }

        function showForgot() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('forgotForm').classList.remove('hidden');
        }

        async function register() {
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            
            const res = await fetch(`${API_URL}/api/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            
            if (data.token) {
                localStorage.setItem('token', data.token);
                showApp();
                loadPhotos();
            } else {
                alert(data.error || 'Ошибка регистрации');
            }
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const res = await fetch(`${API_URL}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            
            if (data.token) {
                localStorage.setItem('token', data.token);
                showApp();
                loadPhotos();
            } else {
                alert(data.error || 'Ошибка входа');
            }
        }

        async function forgotPassword() {
            const email = document.getElementById('forgotEmail').value;
            await fetch(`${API_URL}/api/forgot-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            alert('Код отправлен на email (проверьте консоль сервера)');
            showLogin();
        }

        async function uploadPhoto() {
            const file = document.getElementById('fileInput').files[0];
            const caption = document.getElementById('caption').value;
            
            if (!file) return;
            
            const formData = new FormData();
            formData.append('photo', file);
            formData.append('caption', caption);
            
            const res = await fetch(`${API_URL}/api/photos`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                body: formData
            });
            const data = await res.json();
            
            if (data.photo) {
                document.getElementById('fileInput').value = '';
                document.getElementById('caption').value = '';
                loadPhotos();
            } else {
                alert(data.error || 'Ошибка загрузки');
            }
        }

        async function loadPhotos() {
            const res = await fetch(`${API_URL}/api/photos`, {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            });
            const data = await res.json();
            
            if (data.photos) {
                const usedMB = (data.storageUsed / 1024 / 1024).toFixed(1);
                const limitMB = (data.storageLimit / 1024 / 1024).toFixed(0);
                const percent = (data.storageUsed / data.storageLimit * 100).toFixed(1);
                
                document.getElementById('storageInfo').innerHTML = `
                    💾 Использовано: ${usedMB} MB из ${limitMB} MB (${percent}%)
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${percent}%"></div>
                    </div>
                `;
                
                const gallery = document.getElementById('gallery');
                if (data.photos.length === 0) {
                    gallery.innerHTML = '<p style="text-align:center; color:#718096;">Пока нет фото. Загрузите первое воспоминание ❤️</p>';
                } else {
                    gallery.innerHTML = data.photos.map(p => `
                        <div class="photo-card">
                            <img src="${p.url}" onclick="window.open('${p.url}')">
                            <div class="photo-info">
                                <div class="photo-caption">${escapeHtml(p.caption) || '💕'}</div>
                                <button class="delete-btn" onclick="deletePhoto('${p._id}')">🗑 Удалить</button>
                            </div>
                        </div>
                    `).join('');
                }
            }
        }

        async function deletePhoto(id) {
            if (confirm('Удалить это фото?')) {
                await fetch(`${API_URL}/api/photos/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                loadPhotos();
            }
        }

        function logout() {
            localStorage.removeItem('token');
            showAuth();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
    </script>
</body>
</html>
